<!--
  native-callback.html — static drop-in template for @despia/oauth.

  Use this template when:
    • You're using Supabase / Firebase / another IdP that handles the
      code exchange itself (tokens arrive in the URL fragment), OR
    • Your callback page is hosted on a different origin than your
      backend (static frontend on a CDN, API on api.yourapp.com), OR
    • You want the simplest possible setup and your IdP supports
      implicit flow (tokens directly in the redirect URL).

  Place this file at `public/native-callback.html` (or whatever path
  you passed as `exitPath` to `oauth.google({…})` etc.).

  Zero JS configuration: the <despia-oauth-callback> custom element
  reads its config from the OAuth `state` parameter that the `oauth.*`
  helpers encoded when building the URL.

  ============================================================================
  IF YOUR CALLBACK PAGE IS SERVED BY YOUR OWN BACKEND
  ============================================================================

  Don't use this template — see `native-callback-server-rendered.html`
  instead. The server-rendered pattern lets your backend exchange the
  authorization code during the GET request that serves the page,
  skipping a needless client-side fetch back to the same backend.

  ============================================================================

  No `despia-native` library required. The deeplink fire is a plain
  `window.location.href = 'myapp://oauth/auth?…'` set, intercepted by
  the Despia runtime at the OS URL-scheme level. Zero runtime deps.

  Why a static HTML file rather than a framework route: React Router
  and Vue Router can strip the `#access_token` URL fragment before
  your callback logic runs. A plain HTML file in `public/` bypasses
  every router. If you'd rather use a framework route, import
  `handleNativeCallback` from `@despia/oauth` and call it from a
  useEffect / onMount hook.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Completing sign in…</title>
</head>
<body>
  <despia-oauth-callback></despia-oauth-callback>

  <!--
    Loads and auto-registers the <despia-oauth-callback> custom element.
    For self-hosted (no CDN), copy
    `node_modules/@despia/oauth/dist/umd/web-components.min.js`
    to your public folder and update the src here.
  -->
  <script type="module" src="https://unpkg.com/@despia/oauth/dist/umd/web-components.min.js"></script>
</body>
</html>
